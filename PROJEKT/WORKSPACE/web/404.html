<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>404 — verloren im All · Shape Miner</title>
<style>
  /* Eigenständige, animierte 404-Seite (keine externen Dateien).
     Verwendet für editor / deluxe / login.shapeminer.com. */
  :root{
    --bg:#04050C; --akzent:#66E0FF; --akzent2:#9D6BFF;
    --text:rgba(255,255,255,.92); --text60:rgba(255,255,255,.6); --text40:rgba(255,255,255,.4);
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(1100px 520px at 80% -10%,rgba(102,224,255,.10),transparent 60%),
      radial-gradient(900px 520px at -10% 110%,rgba(157,107,255,.10),transparent 60%);
    color:var(--text);font-family:var(--sans);
    display:grid;place-items:center;overflow:hidden;text-align:center;padding:24px;
  }
  /* Sternenfeld */
  .stern{position:fixed;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;animation:funkeln 3s ease-in-out infinite}
  @keyframes funkeln{0%,100%{opacity:.15}50%{opacity:.8}}
  /* Treibende Shape-Miner-Formen im Hintergrund */
  .formen{position:fixed;inset:0;pointer-events:none;z-index:0}
  .formen svg{position:absolute;opacity:.16;animation:treiben linear infinite}
  @keyframes treiben{
    0%{transform:translateY(0) rotate(0deg)}
    100%{transform:translateY(-40px) rotate(360deg)}
  }
  .inhalt{position:relative;z-index:2;max-width:520px}
  .ziffern{
    font-family:var(--mono);font-weight:700;line-height:1;
    font-size:clamp(96px,26vw,200px);letter-spacing:.02em;
    color:var(--akzent);text-shadow:0 0 38px rgba(102,224,255,.55);
    animation:schweben 5s ease-in-out infinite;
  }
  @keyframes schweben{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  /* Rakete driftet langsam quer */
  .rakete{font-size:40px;display:inline-block;animation:drift 6s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translateX(-8px) rotate(-8deg)}50%{transform:translateX(8px) rotate(8deg)}}
  h1{font-size:clamp(18px,5vw,26px);margin:6px 0 10px;letter-spacing:.01em}
  p{color:var(--text60);line-height:1.6;margin:0 auto 26px;max-width:420px}
  .knoepfe{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.knopf{
    display:inline-flex;align-items:center;gap:8px;text-decoration:none;
    padding:13px 22px;border-radius:11px;font-weight:600;font-size:15px;
    transition:filter .15s,background .15s,border-color .15s,transform .05s;
  }
  a.knopf:active{transform:translateY(1px)}
  .primaer{background:var(--akzent);color:#04121C;box-shadow:0 0 20px rgba(102,224,255,.35)}
  .primaer:hover{filter:brightness(1.1)}
  .geist{background:rgba(255,255,255,.03);color:var(--text);border:1px solid rgba(255,255,255,.18)}
  .geist:hover{border-color:rgba(102,224,255,.5);color:var(--akzent)}
  .marke{margin-top:34px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text40)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="formen" id="formen"></div>

  <div class="inhalt">
    <div class="ziffern">404</div>
    <div class="rakete" aria-hidden="true">🚀</div>
    <h1>Verloren im All</h1>
    <p>Diese Seite gibt es nicht (mehr). Vielleicht ein Tippfehler in der Adresse oder ein Asteroid hat sie erwischt.</p>
    <div class="knoepfe">
      <a class="knopf primaer" href="/">Zur Startseite</a>
      <a class="knopf geist" href="https://login.shapeminer.com">Zum Login</a>
    </div>
    <div class="marke">Shape Miner</div>
  </div>

  <script>
    // Sterne + treibende Formen rein dekorativ per JS streuen.
    (function(){
      var b=document.body;
      for(var i=0;i<40;i++){
        var s=document.createElement('div');s.className='stern';
        s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
        s.style.animationDelay=(Math.random()*3)+'s';
        s.style.transform='scale('+(0.5+Math.random()*1.6)+')';
        b.appendChild(s);
      }
      var formen=[
        '<polygon points="20,2 38,36 2,36"/>',          // Dreieck
        '<rect x="6" y="6" width="28" height="28" rx="3"/>', // Quadrat
        '<polygon points="20,2 38,20 20,38 2,20"/>',     // Diamant
        '<polygon points="32,20 26,32 14,32 8,20 14,8 26,8"/>' // Sechseck
      ];
      var farben=['#66E0FF','#9D6BFF'];
      var wrap=document.getElementById('formen');
      for(var j=0;j<9;j++){
        var c=farben[j%2];
        var svg='<svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="'+c+'" stroke-width="2">'+formen[j%formen.length]+'</svg>';
        var d=document.createElement('div');d.innerHTML=svg;d=d.firstChild;
        d.style.left=Math.random()*100+'vw';d.style.top=Math.random()*100+'vh';
        var sc=0.6+Math.random()*1.8;d.style.width=(40*sc)+'px';d.style.height=(40*sc)+'px';
        d.style.animationDuration=(10+Math.random()*16)+'s';
        d.style.animationDelay=(Math.random()*-20)+'s';
        wrap.appendChild(d);
      }
    })();
  </script>
</body>
</html>
